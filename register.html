<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SafeBakes</title>
    <link rel="icon" type="image/png" href="img/WhatsApp Image 2026-04-10 at 3.21.17 PM.jpeg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-main);
            padding: 2rem 0;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .logo-auth {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            text-decoration: none;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-main);
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="home-premium.html" class="logo" style="justify-content: center; margin-bottom: 2rem; font-size: 2rem;">
        <i class="fas fa-bread-slice"></i> SafeBakes
    </a>
    <div class="card-body">
        <h1 style="margin-bottom: 2rem; font-size: 2rem;">Create Account</h1>
        
        <form>
            <div class="form-group">
                <label for="reg_name">Full Name</label>
                <input type="text" id="reg_name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="reg_email">Email Address</label>
                <input type="email" id="reg_email" placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="reg_password">Password</label>
                <input type="password" id="reg_password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="reg_confirm">Confirm Password</label>
                <input type="password" id="reg_confirm" placeholder="••••••••">
            </div>
            
            <div class="btn-wrapper">
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" title="Create your SafeBakes account">Register</button>
            </div>
        </form>
    </div>
    
    <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

</body>
</html>
