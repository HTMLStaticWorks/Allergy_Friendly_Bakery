<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SafeBakes</title>
    <link rel="icon" type="image/png" href="img/WhatsApp Image 2026-04-10 at 3.21.17 PM.jpeg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-main);
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .logo-auth {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-main);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 2.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .social-btn:hover { background: #f8f8f8; }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="home-premium.html" class="logo" style="justify-content: center; margin-bottom: 2rem; font-size: 2rem;"><i class="fas fa-bread-slice"></i> SafeBakes</a>
    <div class="card-body">
        <h1 style="margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h1>
        
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
                <i class="fas fa-eye password-toggle"></i>
            </div>
            
            <div class="flex-row">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">Forgot Password?</a>
            </div>
            
            <div class="btn-wrapper">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </div>
        </form>
    </div>
    
    <div style="margin-top: 2rem; position: relative;">
        <hr style="border: 0; border-top: 1px solid var(--border);">
        <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-card); padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem;">OR</span>
    </div>
    
    <div class="social-login">
        <button type="button" class="social-btn" title="Login with Google"><i class="fab fa-google"></i> Google</button>
        <button type="button" class="social-btn" title="Login with Apple"><i class="fab fa-apple"></i> Apple</button>
    </div>
    
    <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign Up</a>
    </div>
</div>

</body>
</html>
