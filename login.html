<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SafeBakes</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1rem 3rem;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-main);
            font-size: 1rem;
            height: 52px;
            /* Set fixed height for consistency */
        }

        .form-group-input {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 2;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 1.25rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-wrapper {
            margin-bottom: 0.5rem !important;
        }

        .social-btn {
            flex: 1;
            min-width: 120px;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .form-group-input input {
            padding-right: 3rem !important;
            /* Space for eye icon */
        }

        body.auth-page-standalone {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-main);
            padding-top: 0 !important;
        }

        .auth-floating-controls {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        [dir="rtl"] .auth-floating-controls {
            right: auto;
            left: 1rem;
        }

        /* Mobile & Tablet Specific Optimization (Up to 1024px) */
        @media (max-width: 1024px) {
            .auth-card,
            .auth-card * {
                text-align: left !important;
            }

            .auth-card .card-body h1 {
                text-align: center !important;
                font-size: 1.75rem !important;
                margin-bottom: 1.5rem !important;
                margin-left: 0;
            }

            .auth-card .logo {
                justify-content: center !important;
                font-size: 1.75rem !important;
                margin-bottom: 1.5rem !important;
            }

            .auth-footer {
                text-align: center !important;
            }

            .social-login {
                justify-content: center !important;
            }
        }

        @media (max-width: 480px) {
            .auth-main {
                padding: 4rem 0.75rem 2rem;
            }

            .auth-card {
                padding: 2rem 1.25rem;
                box-shadow: none;
                /* Cleaner on small screens */
                border: none;
            }

            .form-group label {
                font-size: 0.9rem;
            }

            .social-login {
                flex-direction: column;
                gap: 0.75rem;
            }

            .social-btn {
                width: 100%;
            }

            .password-toggle {
                right: 0.75rem;
            }

            .remember-forgot-row {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: space-between !important;
                gap: 0.25rem !important;
                flex-wrap: nowrap !important;
                margin-top: 1rem;
                width: 100%;
            }
            
            .remember-forgot-row label {
                margin-bottom: 0 !important;
                display: flex !important;
                align-items: center !important;
                gap: 0.4rem !important;
                font-size: 0.8rem !important;
                white-space: nowrap !important;
                cursor: pointer;
            }

            .remember-forgot-row a {
                font-size: 0.8rem !important;
                white-space: nowrap !important;
                margin-left: auto;
            }

            .card-body {
                padding: 1.5rem 0 !important;
            }
        }
    </style>
</head>

<body class="auth-page-standalone">

    <div class="auth-floating-controls">
        <button type="button" id="theme-toggle" class="toggle-btn" title="Toggle Theme"><i
                class="fas fa-moon"></i></button>
        <button type="button" id="rtl-toggle" class="toggle-btn" title="Toggle RTL"><i
                class="fas fa-right-left"></i></button>
    </div>

    <main class="auth-main">
        <div class="auth-card">
            <a href="index.html" class="logo"
                style="justify-content: center; margin-bottom: 2rem; font-size: 2rem; display: inline-flex; width: 100%;"><i
                    class="fas fa-bread-slice"></i> SafeBakes</a>
            <div class="card-body">
                <h1 style="margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h1>

                <form action="#" method="post">
                    <div class="form-group">
                        <label for="login_email">Email Address</label>
                        <input type="email" id="login_email" name="email" placeholder="you@example.com"
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login_password">Password</label>
                        <div class="form-group-input">
                            <input type="password" id="login_password" name="password" placeholder="Enter your password"
                                autocomplete="current-password">
                            <i class="fas fa-eye password-toggle" title="Show password"></i>
                        </div>
                    </div>

                    <div class="remember-forgot-row">
                        <label>
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">Forgot
                            Password?</a>
                    </div>

                    <div class="btn-wrapper">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                    </div>
                </form>
            </div>

            <div style="margin-top: 1rem; position: relative;">
                <hr style="border: 0; border-top: 1px solid var(--border);">
                <span
                    style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-card); padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem;">OR</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn" title="Login with Google"><i class="fab fa-google"></i>
                    Google</button>
                <button type="button" class="social-btn" title="Login with Apple"><i class="fab fa-apple"></i>
                    Apple</button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
