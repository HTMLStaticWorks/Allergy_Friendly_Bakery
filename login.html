<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Baker - Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
        <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"> 

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

    
</head>

<body class="auth-wrapper">


    <!-- Login Start -->
    <div class="container d-flex justify-content-center">
        <div class="card login-card shadow p-4 p-md-5">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand m-0">
                    <h1 class="text-primary m-0 display-4">Baker</h1>
                </a>
            </div>
            <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif;">Welcome Back</h3>
                <form>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-envelope text-primary"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-lock text-primary"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-primary small">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill mb-3">Login</button>
                    
                    <div class="divider">— OR —</div>
                    
                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <button type="button" class="btn btn-outline-secondary w-100 py-2">
                                <i class="fab fa-google me-2"></i>Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button" class="btn btn-outline-secondary w-100 py-2">
                                <i class="fab fa-facebook-f me-2"></i>Facebook
                            </button>
                        </div>
                    </div>
                    
                    <p class="text-center mb-0">Don't have an account? <a href="register.html" class="text-primary fw-bold">Register</a></p>
                </form>
        </div>
    </div>


    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square rounded-circle back-to-top"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/counterup/counterup.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>

            <script>
        // RTL Toggle
        const rtlToggle = document.getElementById('rtlToggle');
        const rtlText = document.getElementById('rtlText');
        const htmlElement = document.documentElement;

        const savedDir = localStorage.getItem('bakerDir') || 'ltr';
        htmlElement.setAttribute('dir', savedDir);
        
        if (savedDir === 'rtl') {
            document.body.classList.add('text-end');
            if(rtlText) rtlText.innerText = 'LTR';
        } else {
            document.body.classList.remove('text-end');
            if(rtlText) rtlText.innerText = 'RTL';
        }

        if(rtlToggle) {
            rtlToggle.addEventListener('click', () => {
                const currentDir = htmlElement.getAttribute('dir');
                const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
                
                htmlElement.setAttribute('dir', newDir);
                localStorage.setItem('bakerDir', newDir);
                
                if (newDir === 'rtl') {
                    document.body.classList.add('text-end');
                    if(rtlText) rtlText.innerText = 'LTR';
                } else {
                    document.body.classList.remove('text-end');
                    if(rtlText) rtlText.innerText = 'RTL';
                }
            });
        }

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        const savedTheme = localStorage.getItem('bakerTheme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        if(themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = htmlElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                htmlElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('bakerTheme', newTheme);
                updateIcon(newTheme);
            });
        }

        function updateIcon(theme) {
            if (!themeIcon || !themeToggle) return;
            if (theme === 'light') {
                themeIcon.classList.replace('bi-moon-fill', 'bi-sun-fill');
                themeToggle.classList.replace('btn-outline-light', 'btn-outline-dark');
                themeToggle.classList.replace('border-light', 'border-dark');
                if(rtlToggle) {
                   rtlToggle.classList.replace('btn-outline-light', 'btn-outline-dark');
                   rtlToggle.classList.replace('border-light', 'border-dark');
                }
            } else {
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-fill');
                themeToggle.classList.replace('btn-outline-dark', 'btn-outline-light');
                themeToggle.classList.replace('border-dark', 'border-light');
                if(rtlToggle) {
                   rtlToggle.classList.replace('btn-outline-dark', 'btn-outline-light');
                   rtlToggle.classList.replace('border-dark', 'border-light');
                }
            }
        }
    </script>
</body>

</html>
